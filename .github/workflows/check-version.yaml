name: Check Version

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch main
        run: git fetch origin main
      - name: Check version is bumped
        run: |
          MAIN_VERSION=$(git show origin/main:version.txt | tr -d '[:space:]')
          BRANCH_VERSION=$(tr -d '[:space:]' < version.txt)
          if [ "$MAIN_VERSION" = "$BRANCH_VERSION" ]; then
            echo "Version not bumped (still $MAIN_VERSION)"
            exit 1
          fi
          HIGHER=$(printf '%s\n%s\n' "$MAIN_VERSION" "$BRANCH_VERSION" | sort -V | tail -n1)
          if [ "$HIGHER" != "$BRANCH_VERSION" ]; then
            echo "Branch version $BRANCH_VERSION is not greater than main version $MAIN_VERSION"
            exit 1
          fi
